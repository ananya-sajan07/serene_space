<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Serene Space — User Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, Segoe UI, Roboto, Arial;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-container {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px;
      width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo h1 {
      font-size: 24px;
      color: #60a5fa; /* Blue color for users */
    }
    .logo .subtitle {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 1px solid #334155;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      cursor: pointer;
      color: #94a3b8;
      border-bottom: 3px solid transparent;
    }
    .auth-tab.active {
      color: #60a5fa;
      border-bottom-color: #60a5fa;
      font-weight: 500;
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px;
      background: #334155;
      border: 1px solid #475569;
      border-radius: 6px;
      color: white;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #60a5fa;
    }
    .auth-btn {
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      margin-top: 10px;
    }
    .auth-btn:hover {
      background: #2563eb;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }
    .success {
      background: #065f46;
      color: #a7f3d0;
      border: 1px solid #10b981;
    }
    .error {
      background: #7f1d1d;
      color: #fecaca;
      border: 1px solid #dc2626;
    }
    .note {
      text-align: center;
      color: #94a3b8;
      font-size: 11px;
      margin-top: 20px;
      font-style: italic;
    }
    .nav-links {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .nav-links a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 13px;
    }
    .nav-links a:hover {
      text-decoration: underline;
    }

    .debug-btn {
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo">
      <h1>Serene Space</h1>
      <div class="subtitle">User Portal</div>
    </div>
    
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="showTab('login')">Login</div>
      <div class="auth-tab" onclick="showTab('register')">Register</div>
    </div>
    
    <div id="message" class="message"></div>
    
    <!-- Login Form -->
    <form id="loginForm" class="auth-form active">
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" required>
      </div>
      
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required>
      </div>
      
      <button type="submit" class="auth-btn">Login as User</button>
    </form>
    
    <!-- Registration Form -->
    <form id="registerForm" class="auth-form">
      <div class="form-group">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" required>
      </div>
      
      <div class="form-group">
        <label for="regEmail">Email Address</label>
        <input type="email" id="regEmail" required>
      </div>
      
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" required>
      </div>
      
      <div class="form-group">
        <label for="regConfirmPassword">Confirm Password</label>
        <input type="password" id="regConfirmPassword" required>
      </div>
      
      <div class="form-group">
        <label for="regPhone">Phone Number (Optional)</label>
        <input type="tel" id="regPhone">
      </div>

              <div class="form-group">
                <label>District</label>
                <select class="form-control" id="regPlace" required>
                  <option value="">Select your district</option>
                  <option value="Alappuzha">Alappuzha</option>
                  <option value="Ernakulam">Ernakulam</option>
                  <option value="Idukki">Idukki</option>
                  <option value="Kannur">Kannur</option>
                  <option value="Kasaragod">Kasaragod</option>
                  <option value="Kollam">Kollam</option>
                  <option value="Kottayam">Kottayam</option>
                  <option value="Kozhikode">Kozhikode</option>
                  <option value="Malappuram">Malappuram</option>
                  <option value="Palakkad">Palakkad</option>
                  <option value="Pathanamthitta">Pathanamthitta</option>
                  <option value="Thiruvananthapuram">Thiruvananthapuram</option>
                  <option value="Thrissur">Thrissur</option>
                  <option value="Wayanad">Wayanad</option>
                </select>
              </div>
      
      <button type="submit" class="auth-btn">Register as User</button>
    </form>
    
    <div class="note">
      User Login & Registration Portal
    </div>
    
  </div>

  <script>
    // Get CSRF token from cookie
    function getCSRFToken() {
      const name = 'csrftoken=';
      const decodedCookie = decodeURIComponent(document.cookie);
      const ca = decodedCookie.split(';');
      for(let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) === ' ') {
          c = c.substring(1);
        }
        if (c.indexOf(name) === 0) {
          return c.substring(name.length, c.length);
        }
      }
      return '';
    }

    function showTab(tabName) {
      // Update tabs
      document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelector(`.auth-tab[onclick*="${tabName}"]`).classList.add('active');
      
      // Update forms
      document.querySelectorAll('.auth-form').forEach(form => {
        form.classList.remove('active');
      });
      document.getElementById(tabName + 'Form').classList.add('active');
      
      // Clear message
      document.getElementById('message').style.display = 'none';
    }

    // Login Form Handler
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      
      showMessage('Logging in...', '');
      
      fetch('/api/login/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCSRFToken(),
        },
        body: JSON.stringify({ email, password })
      })
      .then(response => {
        console.log('Login Response Status:', response.status);
        return response.text().then(text => {
          try {
            return { json: JSON.parse(text), raw: text, status: response.status };
          } catch(e) {
            return { json: null, raw: text, status: response.status };
          }
        });
      })
      .then(result => {
        console.log('Login Result:', result);
        
        if (result.status === 200 && result.json) {
          const data = result.json;
          
          // Check for success in various formats
          const isSuccess = (data.message && data.message.includes('successful')) || 
                           data.token || 
                           data.user_id ||
                           (data.email && data.email === email);
          
          if (isSuccess) {
            const userName = data.name || data.username || email.split('@')[0];
            
            showMessage(`✅ Login successful! Welcome ${userName}`, 'success');
            
            // Store basic user info
            const userId = data.user_id || data.id || '1';
            localStorage.setItem('user_id', userId);
            localStorage.setItem('user_name', userName);
            localStorage.setItem('user_email', data.email || email);
            localStorage.setItem('user_role', 'user');

            // Fetch user details to get place
            console.log('Fetching user details for ID:', userId);
            fetch(`/api/users/${userId}/`)
              .then(response => {
                console.log('User details response status:', response.status);
                return response.json();
              })
              .then(userDetails => {
                console.log('User details received:', userDetails);
                localStorage.setItem('user_place', userDetails.place || '');
                console.log('Loaded user place from API:', userDetails.place);

                // Redirect to dashboard
                setTimeout(() => {
                  window.location.href = '/admin/user_dashboard/';
                }, 1000);
              })
              .catch(error => {
                console.error('Error fetching user details:', error);
                // Redirect anyway without place
                setTimeout(() => {
                  window.location.href = '/admin/user_dashboard/';
                }, 1000);
              });
      
            
          } else {
            showMessage(`Login failed: ${data.error || data.message || 'Invalid credentials'}`, 'error');
          }
        } else {
          showMessage(`Login failed (Status: ${result.status}): ${result.raw}`, 'error');
        }
      })
      .catch(error => {
        console.error('Login error:', error);
        showMessage(`Network error: ${error.message}`, 'error');
      });
    });

    // Registration Form Handler
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Validate passwords match
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      
      if (password !== confirmPassword) {
        showMessage('Passwords do not match!', 'error');
        return;
      }
      
      const userData = {
        name: document.getElementById('regName').value,
        email: document.getElementById('regEmail').value,
        password: password,
        phone: document.getElementById('regPhone').value || '',
        place: document.getElementById('regPlace').value,
        role: 'user'
      };
      
      showMessage('Registering user account...', '');
      
      fetch('/api/register/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCSRFToken(),
        },
        body: JSON.stringify(userData)
      })
      .then(response => response.json())
      .then(data => {
        console.log('Registration response:', data);

        if (data.message && data.message.includes('successful') || data.id) {
          showMessage(`✅ Registration successful!`, 'success');

          // Store place from registration form
          const userPlace = document.getElementById('regPlace').value;
          console.log('User place from form:', userPlace);

          localStorage.setItem('user_place', userPlace);
          console.log('Saved to localStorage:', localStorage.getItem('user_place'));

          // Auto-fill login form and switch to login tab
          document.getElementById('loginEmail').value = userData.email;
          document.getElementById('loginPassword').value = userData.password;
          showTab('login');
        }
      })
      .catch(error => {
        showMessage(`Network error: ${error}`, 'error');
      });
    });

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = "message";
      messageDiv.style.display = "block";
      
      if (type === 'success') {
        messageDiv.classList.add('success');
      } else if (type === 'error') {
        messageDiv.classList.add('error');
      } else {
        messageDiv.classList.remove('success', 'error');
      }
    }

    function testAPI() {
      const email = document.getElementById('loginEmail').value || 'd@gmail.com';
      const password = document.getElementById('loginPassword').value || 'password123';
      
      const debugOutput = document.getElementById('debugOutput');
      debugOutput.innerHTML = 'Testing API...';
      debugOutput.style.display = 'block';
      
      fetch('/api/login/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCSRFToken(),
        },
        body: JSON.stringify({ email, password })
      })
      .then(response => {
        return response.text().then(text => {
          debugOutput.innerHTML = `
            <strong>Status:</strong> ${response.status} ${response.statusText}<br>
            <strong>Response:</strong><br>
            <pre style="background: #0f172a; padding: 10px; border-radius: 6px; overflow: auto; font-size: 10px;">${escapeHtml(text)}</pre>
          `;
        });
      })
      .catch(error => {
        debugOutput.innerHTML = `<strong>Error:</strong> ${error.message}`;
      });
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
