<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serene Space - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, Segoe UI, Roboto, Arial;
            background: #0f172a;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #1e293b;
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h2 {
            font-size: 18px;
            color: #60a5fa;
        }
        .chat-header .participant {
            color: #94a3b8;
            font-size: 14px;
        }
        .close-btn {
            background: #dc2626;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #0f172a;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.sent {
            align-self: flex-end;
        }
        .message.received {
            align-self: flex-start;
        }
        .message-content {
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .message.sent .message-content {
            background: #3b82f6;
            color: white;
            border-radius: 18px 18px 4px 18px;
        }
        .message.received .message-content {
            background: #1e293b;
            color: #cbd5e1;
            border-radius: 18px 18px 18px 4px;
        }
        .message-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
            padding: 0 5px;
        }
        .chat-input-area {
            background: #1e293b;
            padding: 15px;
            border-top: 1px solid #334155;
            display: flex;
            gap: 10px;
        }
        #chat-input {
            flex: 1;
            padding: 12px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 24px;
            color: white;
            font-size: 14px;
        }
        #chat-input:focus {
            outline: none;
            border-color: #60a5fa;
        }
        #send-btn {
            background: #10b981;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #send-btn:hover {
            background: #059669;
        }
        .connection-status {
            text-align: center;
            padding: 5px;
            font-size: 12px;
            background: #1e293b;
            color: #94a3b8;
        }
        .typing-indicator {
            color: #94a3b8;
            font-size: 12px;
            padding: 5px 15px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div>
            <h2 id="chat-title">Serene Chat</h2>
            <span class="participant" id="chat-participant"></span>
        </div>
        <button class="close-btn" onclick="window.close()">✕</button>
    </div>
    
    <div class="connection-status" id="connection-status">Connecting to chat server...</div>
    
    <div class="chat-messages" id="chat-messages"></div>
    
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Type your message..." disabled>
        <button id="send-btn" disabled>➤</button>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room');
        const userName = urlParams.get('user');
        const otherName = urlParams.get('other');
        const role = urlParams.get('role');
        
        document.getElementById('chat-title').textContent = `Chat with ${otherName}`;
        document.getElementById('chat-participant').textContent = `You: ${userName} (${role})`;
        
        // WebSocket connection
        const chatSocket = new WebSocket(
            'ws://' + window.location.host + '/ws/chat/' + roomName + '/'
        );
        
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDiv = document.getElementById('connection-status');
        
        chatSocket.onopen = function(e) {
            statusDiv.textContent = '✅ Connected';
            statusDiv.style.color = '#10b981';
            chatInput.disabled = false;
            sendBtn.disabled = false;
            chatInput.focus();
        };
        
        chatSocket.onclose = function(e) {
            statusDiv.textContent = '❌ Disconnected - Refresh page to reconnect';
            statusDiv.style.color = '#ef4444';
            chatInput.disabled = true;
            sendBtn.disabled = true;
        };
        
        chatSocket.onerror = function(e) {
            statusDiv.textContent = '❌ Connection error';
            statusDiv.style.color = '#ef4444';
            console.error('WebSocket error:', e);
        };
        
        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            
            if (data.type === 'connection_established') {
                addMessage('system', data.message);
            } else if (data.type === 'chat_message') {
                const isSent = data.username === userName;
                addMessage(data.username, data.message, data.timestamp, isSent);
            }
        };
        
        function addMessage(sender, text, timestamp = '', isSent = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            
            const time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
            
            messageDiv.innerHTML = `
                <div class="message-content">${escapeHTML(text)}</div>
                <div class="message-info">
                    <span>${sender === 'system' ? 'System' : sender}</span>
                    <span>${time}</span>
                </div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function escapeHTML(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function sendMessage() {
            const message = chatInput.value.trim();
            if (message) {
                chatSocket.send(JSON.stringify({
                    'message': message,
                    'username': userName,
                    'timestamp': new Date().toISOString()
                }));
                chatInput.value = '';
            }
        }
        
        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        sendBtn.addEventListener('click', sendMessage);
    </script>
</body>
</html>
